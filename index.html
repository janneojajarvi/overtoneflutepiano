<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>D-Pitkähuilu Piano</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="piano-app-container">
        <header class="app-header">
            <h3>D-Overtone Flute: All Keys / D-Pitkähuilu: Kaikki otteet</h3>
        </header>

        <!-- Tämä on rullaava alue -->
        <div id="wp-piano-grid"></div>

        <footer class="info-section">
            <h4>Information / Merkkiselitys</h4>
            <div class="info-list">
                <div class="info-item">
                    <span class="swatch swatch-open"></span>
                    <span>Open / Avoin: Even harmonics</span>
                </div>
                <div class="info-item">
                    <span class="swatch swatch-closed"></span>
                    <span>Closed / Suljettu: Odd harmonics</span>
                </div>
                <div class="info-item">
                    <span class="swatch swatch-half"></span>
                    <span>Half-closed / Puolisulku</span>
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
